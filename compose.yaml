name: warp-socks

services:
  warp-socks:
    build:
      context: .
    # 显式指定镜像名，避免 Compose 默认生成 warp-socks-warp-socks 这种重复名称。
    image: warp-socks:latest
    container_name: warp-socks
    restart: ${RESTART_POLICY:-unless-stopped}
    mem_limit: 256m
    cpus: 0.50
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      # wg-quick 依赖这个标记做策略路由；容器内实际兼容处理已在镜像里固化。
      net.ipv4.conf.all.src_valid_mark: '1'
    environment:
      TEAMS_TOKEN: ${TEAMS_TOKEN:-}
      # 仅用于容器启动日志，帮助区分“宿主机入口”与“容器内监听”。
      HOST_BIND_IP: ${HOST_BIND_IP:-127.0.0.1}
      HOST_BIND_PORT: ${HOST_BIND_PORT:-1080}
      ENDPOINT_CANDIDATES: ${ENDPOINT_CANDIDATES:-}
      LOG_TIMEZONE: ${LOG_TIMEZONE:-CST-8}
      LOG_TIME_FORMAT: ${LOG_TIME_FORMAT:-%Y-%m-%d %H:%M:%S %Z}
      MICROSOCKS_LOG_ACCESS: ${MICROSOCKS_LOG_ACCESS:-1}
      MICROSOCKS_LOG_LOCAL_CLIENTS: ${MICROSOCKS_LOG_LOCAL_CLIENTS:-0}
    logging:
      driver: json-file
      options:
        max-size: 1m
        max-file: '1'
    ports:
      # 默认只绑定到本机，先确保代理可用；需要对外暴露时再改 HOST_BIND_IP=0.0.0.0
      - '${HOST_BIND_IP:-127.0.0.1}:${HOST_BIND_PORT:-1080}:1080'
    volumes:
      # 把注册结果和 WireGuard 配置直接落到当前目录，便于查看和备份。
      - ./wireguard:/etc/wireguard
